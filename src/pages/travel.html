<!DOCTYPE html>
<html lang="en">
<head>
  <%- include('../components/html-head', { title: 'Travel Atlas | Athithyan' }) %>
  <style>
    .masonry { column-count: 1; column-gap: 1rem; }
    @media (min-width: 640px) { .masonry { column-count: 2; } }
    @media (min-width: 1024px) { .masonry { column-count: 3; } }
    .masonry-item { break-inside: avoid; margin-bottom: 1rem; }
    .lightbox-overlay { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); }
  </style>
</head>
<body x-data="travelAtlas">
  <%- include('../components/nav') %>

  <header class="max-w-7xl mx-auto px-6 py-12 flex flex-col md:flex-row justify-between items-center gap-6">
    <div>
      <h1 class="text-4xl font-bold mb-2">Travel <span class="accent-text">Atlas</span></h1>
      <p class="text-gray-400">A visual diary of wanderlust and discovery.</p>
    </div>

    <template x-if="activeTrip === null">
      <div class="relative w-full md:w-64">
        <input type="text" x-model="searchQuery" placeholder="Search location or year..."
               class="w-full px-4 py-2 rounded-full bg-[#111] border border-gray-800 focus:border-[#6366f1] outline-none transition-colors">
      </div>
    </template>

    <template x-if="activeTrip !== null">
      <button @click="activeTrip = null; window.location.hash = ''" class="px-4 py-2 glass rounded-full font-medium hover:bg-gray-800 transition-colors flex items-center gap-2">
        <span>&larr;</span> Back to Explorer
      </button>
    </template>
  </header>

  <main class="max-w-7xl mx-auto px-6 pb-20">
    <div x-show="loading" class="text-center text-gray-500 py-20">Loading adventures...</div>
    <div x-show="error" class="text-center text-red-500 py-20" x-text="'Error: ' + error"></div>

    <template x-if="!loading && !error && activeTrip === null">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
        <template x-for="trip in filteredTrips" :key="trip.id">
          <div @click="loadTrip(trip.id)" class="glass rounded-3xl overflow-hidden cursor-pointer transition-transform hover:scale-[1.02] group">
            <div class="h-64 overflow-hidden relative">
              <img :src="trip.coverPhoto" :alt="trip.title" loading="lazy" class="w-full h-full object-cover transition-transform group-hover:scale-110 duration-500">
              <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
              <div class="absolute bottom-4 left-4 text-white">
                <span class="text-xs font-bold uppercase tracking-widest opacity-70" x-text="trip.id.split('-').slice(0,2).join('-')"></span>
              </div>
            </div>
            <div class="p-6">
              <h3 class="text-xl font-bold mb-2" x-text="trip.title"></h3>
              <div class="flex justify-between items-center">
                <p class="text-gray-400 text-sm line-clamp-1" x-text="trip.description || 'No description available.'"></p>
                <span class="text-xs font-medium accent-text" x-text="`${trip.photoCount} photos`"></span>
              </div>
            </div>
          </div>
        </template>
      </div>
    </template>

    <template x-if="activeTrip !== null">
      <div class="animate-in fade-in duration-500">
        <template x-if="currentTripData">
          <div class="mb-12 text-center">
            <h2 class="text-5xl font-bold mb-4" x-text="currentTripData.title"></h2>
            <p class="text-gray-400 text-xl max-w-3xl mx-auto" x-text="currentTripData.description"></p>
          </div>
        </template>

        <div class="masonry" x-show="currentTripData">
          <template x-for="(photo, index) in currentTripData?.photos" :key="index">
            <div @click="selectedPhoto = photo" class="masonry-item cursor-pointer relative group overflow-hidden rounded-2xl">
              <img :src="photo.url" :alt="`Photo ${index + 1}`" loading="lazy" class="w-full h-auto block transition-transform group-hover:scale-105 duration-500">
              <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                <p class="text-xs text-white" x-text="photo.date ? new Date(photo.date).toLocaleDateString() : 'Unknown date'"></p>
              </div>
            </div>
          </template>
        </div>
        <div x-show="!currentTripData && !loading" class="text-center text-gray-500 py-20">Loading photos...</div>
      </div>
    </template>
  </main>

  <template x-if="selectedPhoto">
    <div class="fixed inset-0 z-50 lightbox-overlay flex items-center justify-center p-4 md:p-12"
         @keydown.escape.window="selectedPhoto = null"
         @click.self="selectedPhoto = null">

      <button @click="selectedPhoto = null" class="absolute top-6 right-6 text-white text-3xl hover:text-gray-400">&times;</button>

      <div class="max-w-6xl w-full h-full flex flex-col md:flex-row gap-8">
        <div class="flex-1 flex items-center justify-center overflow-hidden rounded-2xl">
          <img :src="selectedPhoto.url" class="max-w-full max-h-full object-contain shadow-2xl">
        </div>

        <div class="w-full md:w-80 glass p-8 rounded-3xl flex flex-col gap-6">
          <div>
            <h4 class="text-gray-500 text-xs uppercase font-bold tracking-widest mb-2">Date</h4>
            <p class="text-lg" x-text="selectedPhoto.date ? new Date(selectedPhoto.date).toLocaleString() : 'Unknown date'"></p>
          </div>
          <div>
            <h4 class="text-gray-500 text-xs uppercase font-bold tracking-widest mb-2">Camera</h4>
            <p class="text-lg" x-text="selectedPhoto.camera || 'Unknown camera'"></p>
          </div>
          <template x-if="selectedPhoto.lat && selectedPhoto.lng">
            <div>
              <h4 class="text-gray-500 text-xs uppercase font-bold tracking-widest mb-2">Location</h4>
              <a :href="`https://maps.google.com/?q=${selectedPhoto.lat},${selectedPhoto.lng}`" target="_blank"
                 class="inline-flex items-center gap-2 text-[#6366f1] hover:underline">
                 <span>📍</span> Open in Maps
              </a>
            </div>
          </template>
        </div>
      </div>
    </div>
  </template>

  <%- include('../components/footer') %>
</body>
</html>
